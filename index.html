<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oggy Calculator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }

    .calculator {
      background: #16213e;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      width: 320px;
    }

    #display {
      width: 100%;
      height: 60px;
      background: #0f3460;
      border: none;
      border-radius: 8px;
      color: #e2e2e2;
      font-size: 28px;
      text-align: right;
      padding: 10px 16px;
      outline: none;
      margin-bottom: 16px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      height: 56px;
      border: none;
      border-radius: 10px;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .num { background: #1f4068; color: #e2e2e2; }
    .num:hover { background: #2a5080; }

    .op { background: #e94560; color: #fff; }
    .op:hover { background: #f05a73; }

    .fn { background: #533483; color: #fff; }
    .fn:hover { background: #6b44a8; }

    button:active { transform: scale(0.96); }
  </style>
</head>
<body>
  <div class="calculator">
    <input type="text" id="display" readonly>
    <div class="buttons">
      <button class="fn" onclick="clearDisplay()">AC</button>
      <button class="fn" onclick="backspace()">⌫</button>
      <button class="fn" onclick="append('%')">%</button>
      <button class="op" onclick="append('/')">÷</button>

      <button class="num" onclick="append('7')">7</button>
      <button class="num" onclick="append('8')">8</button>
      <button class="num" onclick="append('9')">9</button>
      <button class="op" onclick="append('*')">×</button>

      <button class="num" onclick="append('4')">4</button>
      <button class="num" onclick="append('5')">5</button>
      <button class="num" onclick="append('6')">6</button>
      <button class="op" onclick="append('-')">−</button>

      <button class="num" onclick="append('1')">1</button>
      <button class="num" onclick="append('2')">2</button>
      <button class="num" onclick="append('3')">3</button>
      <button class="op" onclick="append('+')">+</button>

      <button class="num" onclick="append('00')">00</button>
      <button class="num" onclick="append('0')">0</button>
      <button class="num" onclick="append('.')">.</button>
      <button class="op" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    const display = document.getElementById('display');

    function append(val) {
      display.value += val;
    }

    function clearDisplay() {
      display.value = '';
    }

    function backspace() {
      display.value = display.value.slice(0, -1);
    }

    function calculate() {
      try {
        display.value = eval(display.value);
      } catch {
        display.value = 'Error';
      }
    }
  </script>
</body>
</html>
